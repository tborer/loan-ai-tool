<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan AI Tool</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .tab-bar {
      display: flex;
      background: #ffffff;
      border-bottom: 2px solid #e0e4ef;
      padding: 0 32px;
    }

    .tab-btn {
      padding: 16px 24px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #6b7280;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .tab-btn:hover {
      color: #1a1a2e;
    }

    .tab-btn.active {
      color: #2563eb;
      border-bottom-color: #2563eb;
      font-weight: 600;
    }

    .tab-panel {
      display: none;
      padding: 48px 32px;
    }

    .tab-panel.active {
      display: block;
    }

    .tab-panel h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .tab-panel p {
      color: #6b7280;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <header>Loan AI Tool</header>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="research">Data Research Dashboard</button>
    <button class="tab-btn" data-tab="ai-processing">AI Assisted Processing</button>
  </div>

  <div id="tab-research" class="tab-panel active">
    <h2>Data Research Dashboard</h2>
    <p>Content coming soon.</p>
  </div>

  <div id="tab-ai-processing" class="tab-panel">
    <h2>AI Assisted Processing</h2>
    <p>Content coming soon.</p>
  </div>

  <script>
    const buttons = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });
  </script>

</body>
</html>
